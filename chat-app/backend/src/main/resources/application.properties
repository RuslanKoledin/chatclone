spring.application.name=chatapp-backend


# --- PostgreSQL Settings ---
# Подключение настраивается через переменные окружения:
# MCHAT_DB_URL, MCHAT_DB_USERNAME, MCHAT_DB_PASSWORD
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${MCHAT_DB_URL:jdbc:postgresql://localhost:5432/mchat?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false}
spring.datasource.username=${MCHAT_DB_USERNAME:ruslan}
spring.datasource.password=${MCHAT_DB_PASSWORD:}
spring.datasource.driverClassName=org.postgresql.Driver

# --- H2 Settings (тестовый режим — закомментировано) ---
#spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=password
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.h2.console.settings.trace=false
#spring.h2.console.settings.web-allow-others=false

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
# Для разработки: update, для продакшена: validate
spring.jpa.hibernate.ddl-auto=${MCHAT_DDL_AUTO:update}

# --- File Upload Settings ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# --- Active Directory Settings ---
# Режим: test (тестовые пользователи) или ldap (реальный AD)
ad.mode=test

# Настройки для режима ldap (раскомментировать при подключении к реальному AD)
